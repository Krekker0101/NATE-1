<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">XITKUN product journey</title>
  <desc id="desc">A roadmap-style journey showing setup, runtime selection, packaging, and delivery for XITKUN.</desc>
  <defs>
    <linearGradient id="bg" x1="88" y1="44" x2="1496" y2="794" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.52" stop-color="#09111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="rail" x1="202" y1="432" x2="1398" y2="432" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020617" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1600" height="860" rx="36" fill="url(#bg)"/>
  <text x="98" y="124" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="52" font-weight="700">From setup to shipped desktop build</text>
  <text x="98" y="168" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="24">XITKUN is now framed as a product journey, not just a source tree</text>

  <path d="M202 432H1398" stroke="url(#rail)" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <circle cx="270" cy="432" r="22" fill="#2DD4BF"/>
    <rect x="122" y="232" width="296" height="152" rx="28" fill="#0B1220" stroke="#27405D"/>
    <text x="154" y="282" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">01 / Setup</text>
    <text x="154" y="320" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Install and launch</text>
    <text x="154" y="352" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Node, Electron, renderer build, desktop shell, first-run experience.</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="604" cy="432" r="22" fill="#60A5FA"/>
    <rect x="456" y="488" width="296" height="152" rx="28" fill="#0B1220" stroke="#27405D"/>
    <text x="488" y="538" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">02 / AI Layer</text>
    <text x="488" y="576" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Connect your stack</text>
    <text x="488" y="608" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">OpenAI, OpenRouter, DeepSeek, custom OpenAI-compatible APIs, or local Ollama.</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="938" cy="432" r="22" fill="#A78BFA"/>
    <rect x="790" y="232" width="296" height="152" rx="28" fill="#0B1220" stroke="#27405D"/>
    <text x="822" y="282" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">03 / Runtime</text>
    <text x="822" y="320" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Work in flow</text>
    <text x="822" y="352" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Overlay answers, screenshots, notes, context retrieval, and fast model switching.</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1272" cy="432" r="22" fill="#F59E0B"/>
    <rect x="1124" y="488" width="296" height="152" rx="28" fill="#0B1220" stroke="#27405D"/>
    <text x="1156" y="538" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">04 / Delivery</text>
    <text x="1156" y="576" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Ship XITKUN</text>
    <text x="1156" y="608" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Dark Windows installer assets, branded packages, portable build, release-ready artifacts.</text>
  </g>

  <text x="98" y="772" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">SETUP  /  CONNECT  /  ASSIST  /  SHIP</text>
</svg>
