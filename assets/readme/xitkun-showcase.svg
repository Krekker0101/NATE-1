<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">XITKUN showcase</title>
  <desc id="desc">A premium showcase board for XITKUN features, including overlay workflow, AI services, and offline Ollama routing.</desc>
  <defs>
    <linearGradient id="bg" x1="48" y1="38" x2="1530" y2="944" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.48" stop-color="#09111F"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="stroke" x1="120" y1="140" x2="1450" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020617" flood-opacity="0.6"/>
    </filter>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1328 168) rotate(90) scale(220 280)">
      <stop stop-color="#38BDF8" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#bg)"/>
  <ellipse cx="1328" cy="168" rx="240" ry="180" fill="url(#glow)"/>

  <rect x="64" y="64" width="1472" height="852" rx="30" fill="white" fill-opacity="0.025" stroke="url(#stroke)"/>

  <text x="108" y="136" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">What makes XITKUN feel premium</text>
  <text x="108" y="182" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">Desktop-first workflow, user-controlled routing, and a stronger sense of product polish</text>

  <g filter="url(#shadow)">
    <rect x="108" y="240" width="436" height="586" rx="30" fill="#0B1220" stroke="#28405D"/>
    <rect x="144" y="286" width="364" height="232" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="170" y="320" width="198" height="16" rx="8" fill="#1E293B"/>
    <rect x="170" y="352" width="290" height="14" rx="7" fill="#1F3B5A"/>
    <rect x="170" y="402" width="144" height="38" rx="19" fill="#0F172A" stroke="#2A5175"/>
    <text x="194" y="427" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Overlay Live</text>
    <rect x="330" y="402" width="150" height="38" rx="19" fill="#0F172A" stroke="#2A5175"/>
    <text x="352" y="427" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Screenshot AI</text>
    <path d="M170 470C228 452 256 456 312 482C360 504 401 507 450 489" stroke="#5EEAD4" stroke-width="4" stroke-linecap="round"/>
    <circle cx="170" cy="470" r="8" fill="#5EEAD4"/>
    <circle cx="312" cy="482" r="8" fill="#60A5FA"/>
    <circle cx="450" cy="489" r="8" fill="#A78BFA"/>
    <text x="144" y="578" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Live overlay workflow</text>
    <text x="144" y="620" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">Fast desktop responses without living in a browser tab stack.</text>
    <circle cx="154" cy="668" r="7" fill="#2DD4BF"/>
    <text x="176" y="675" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Overlay windows with focused, real-time usage</text>
    <circle cx="154" cy="714" r="7" fill="#60A5FA"/>
    <text x="176" y="721" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Screenshot analysis and answer surfaces</text>
    <circle cx="154" cy="760" r="7" fill="#A78BFA"/>
    <text x="176" y="767" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Built for interviews, calls, and fast context switching</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="582" y="240" width="436" height="586" rx="30" fill="#0B1220" stroke="#28405D"/>
    <rect x="618" y="286" width="364" height="252" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="650" y="324" width="126" height="38" rx="19" fill="#0F172A" stroke="#365A7E"/>
    <text x="682" y="349" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">OpenAI</text>
    <rect x="792" y="324" width="154" height="38" rx="19" fill="#0F172A" stroke="#365A7E"/>
    <text x="822" y="349" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">OpenRouter</text>
    <rect x="650" y="384" width="140" height="38" rx="19" fill="#0F172A" stroke="#365A7E"/>
    <text x="682" y="409" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">DeepSeek</text>
    <rect x="808" y="384" width="138" height="38" rx="19" fill="#0F172A" stroke="#365A7E"/>
    <text x="826" y="409" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Custom API</text>
    <rect x="650" y="454" width="296" height="48" rx="18" fill="#091220" stroke="#284B6E"/>
    <text x="676" y="484" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">service:&lt;id&gt; runtime selection</text>
    <text x="618" y="578" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Bring your own AI services</text>
    <text x="618" y="620" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">No forced provider lock-in. You choose the endpoint, model, key, and route.</text>
    <circle cx="628" cy="668" r="7" fill="#2DD4BF"/>
    <text x="650" y="675" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">ChatGPT / OpenAI, OpenRouter, DeepSeek supported</text>
    <circle cx="628" cy="714" r="7" fill="#60A5FA"/>
    <text x="650" y="721" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Custom OpenAI-compatible endpoints supported</text>
    <circle cx="628" cy="760" r="7" fill="#A78BFA"/>
    <text x="650" y="767" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Model labels and routing stay unified across the UI</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1056" y="240" width="436" height="586" rx="30" fill="#0B1220" stroke="#28405D"/>
    <rect x="1092" y="286" width="364" height="252" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="1122" y="326" width="182" height="42" rx="21" fill="#0F172A" stroke="#355C61"/>
    <text x="1150" y="353" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Local Ollama</text>
    <circle cx="1281" cy="347" r="6" fill="#22C55E"/>
    <rect x="1122" y="388" width="304" height="44" rx="18" fill="#091220" stroke="#284B6E"/>
    <text x="1148" y="416" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">qwen2.5  /  llama3.1  /  mistral</text>
    <rect x="1122" y="452" width="244" height="44" rx="18" fill="#091220" stroke="#284B6E"/>
    <text x="1148" y="480" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="600">Detected automatically</text>
    <text x="1092" y="578" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Offline by design</text>
    <text x="1092" y="620" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="20">If Ollama already has downloaded models, XITKUN surfaces them without noisy setup friction.</text>
    <circle cx="1102" cy="668" r="7" fill="#22C55E"/>
    <text x="1124" y="675" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Local mode can stay offline and user-controlled</text>
    <circle cx="1102" cy="714" r="7" fill="#F59E0B"/>
    <text x="1124" y="721" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">No unnecessary warnings if no local model is present</text>
    <circle cx="1102" cy="760" r="7" fill="#38BDF8"/>
    <text x="1124" y="767" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="19">Switch between privacy, speed, and cloud power when needed</text>
  </g>
</svg>
