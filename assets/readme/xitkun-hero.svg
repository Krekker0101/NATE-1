<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">XITKUN hero banner</title>
  <desc id="desc">A futuristic dark banner for XITKUN, a local-first AI desktop copilot.</desc>
  <defs>
    <linearGradient id="bg" x1="70" y1="42" x2="1450" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040816"/>
      <stop offset="0.48" stop-color="#0A1222"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="312" y1="96" x2="1456" y2="628" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9" stop-opacity="0.65"/>
      <stop offset="0.45" stop-color="#60A5FA" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="accent" x1="108" y1="112" x2="586" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#60A5FA"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1208 196) rotate(90) scale(240 290)">
      <stop stop-color="#38BDF8" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1328 574) rotate(90) scale(220 280)">
      <stop stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="white" stroke-opacity="0.06"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="32" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1600" height="760" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="760" rx="36" fill="url(#grid)"/>

  <ellipse cx="1244" cy="206" rx="242" ry="184" fill="url(#glowA)" filter="url(#blur)"/>
  <ellipse cx="1324" cy="568" rx="228" ry="168" fill="url(#glowB)" filter="url(#blur)"/>

  <rect x="76" y="78" width="1448" height="604" rx="28" fill="white" fill-opacity="0.025" stroke="url(#panelStroke)"/>
  <rect x="108" y="112" width="478" height="14" rx="7" fill="url(#accent)"/>

  <text x="108" y="220" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="8">XITKUN</text>
  <text x="108" y="274" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing="1.5">LOCAL-FIRST AI DESKTOP COPILOT</text>
  <text x="108" y="338" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="400">Bring your own AI services, auto-detect offline Ollama models,</text>
  <text x="108" y="378" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="400">and stay in flow with a dark, polished desktop-native experience.</text>

  <g filter="url(#shadow)">
    <rect x="108" y="446" width="154" height="44" rx="22" fill="#0F172A" stroke="#24466F"/>
    <text x="138" y="474" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">OpenAI</text>
    <circle cx="235" cy="467" r="6" fill="#2DD4BF"/>

    <rect x="276" y="446" width="186" height="44" rx="22" fill="#0F172A" stroke="#24466F"/>
    <text x="306" y="474" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">OpenRouter</text>
    <circle cx="431" cy="467" r="6" fill="#60A5FA"/>

    <rect x="476" y="446" width="168" height="44" rx="22" fill="#0F172A" stroke="#24466F"/>
    <text x="506" y="474" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">DeepSeek</text>
    <circle cx="612" cy="467" r="6" fill="#A78BFA"/>

    <rect x="108" y="506" width="158" height="44" rx="22" fill="#0F172A" stroke="#24466F"/>
    <text x="138" y="534" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Ollama</text>
    <circle cx="236" cy="527" r="6" fill="#22C55E"/>

    <rect x="280" y="506" width="146" height="44" rx="22" fill="#0F172A" stroke="#24466F"/>
    <text x="310" y="534" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Offline</text>
    <circle cx="396" cy="527" r="6" fill="#F59E0B"/>

    <rect x="440" y="506" width="208" height="44" rx="22" fill="#0F172A" stroke="#24466F"/>
    <text x="470" y="534" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Dark Installer</text>
    <circle cx="616" cy="527" r="6" fill="#38BDF8"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="940" y="112" width="466" height="200" rx="26" fill="#0B1220" fill-opacity="0.78" stroke="#2A3B58"/>
    <text x="972" y="158" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">AI Services</text>
    <text x="972" y="196" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">OpenAI, OpenRouter, DeepSeek, Custom OpenAI-compatible</text>

    <rect x="972" y="222" width="402" height="52" rx="16" fill="#111827" stroke="#304865"/>
    <circle cx="1002" cy="248" r="7" fill="#2DD4BF"/>
    <text x="1022" y="254" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Bring your own key, model, and base URL</text>

    <path d="M972 286H1374" stroke="#1E293B"/>
    <text x="972" y="308" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">service:&lt;id&gt; runtime routing</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="884" y="344" width="522" height="242" rx="26" fill="#0B1220" fill-opacity="0.78" stroke="#2A3B58"/>
    <text x="916" y="390" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Local Model Detection</text>
    <text x="916" y="428" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="18">If Ollama already has models, XITKUN picks them up automatically.</text>

    <rect x="916" y="454" width="226" height="96" rx="18" fill="#111827" stroke="#304865"/>
    <text x="944" y="488" fill="#7DD3FC" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Local Ollama</text>
    <text x="944" y="516" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">qwen2.5</text>
    <text x="944" y="540" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">llama3.1</text>

    <rect x="1170" y="454" width="204" height="96" rx="18" fill="#111827" stroke="#304865"/>
    <text x="1198" y="488" fill="#A78BFA" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Desktop UX</text>
    <text x="1198" y="516" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="18">Overlay</text>
    <text x="1198" y="540" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="15">Screenshots, notes, fast answers</text>
  </g>

  <text x="108" y="640" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">PRIVATE WHEN POSSIBLE  /  CLOUD WHEN YOU CHOOSE  /  DESKTOP-FIRST BY DESIGN</text>
</svg>
